<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1565C0">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icons/icon-192.png">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<title>SnapVid</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg:#0F0F0F;
    --text:#FFFFFF;
    --blue:#1565C0;
    --blue-light:#1E7FE0;
    --red:#D32F2F;
    --gray:#2B2B2B;
    --gray-line:#3a3a3a;
    --muted:#9A9A9A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:30px 16px;
  }
  h1,.mono{font-family:'Cairo', sans-serif;}

  .phone{
    width:340px; background:var(--bg); border:1px solid var(--gray-line);
    border-radius:34px; padding:14px;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
  }
  .screen{ background:var(--bg); border-radius:22px; padding:22px 18px 26px; }
  .status-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
  .app-title{ font-weight:700; font-size:16px; display:flex; align-items:center; gap:8px; font-family:'Cairo',sans-serif;}
  .app-title svg{ width:24px; height:24px; }
  .mode-link{
    font-size:12px; color:var(--blue-light); text-decoration:none; font-family:'Cairo',sans-serif;
    background:rgba(21,101,192,.15); padding:6px 12px; border-radius:20px; border:1px solid var(--blue);
  }
  .lang-row{ display:flex; gap:6px; justify-content:center; margin-bottom:18px; }
  .lang-btn{
    background:var(--gray); border:1px solid var(--gray-line); color:var(--muted);
    font-size:11px; padding:5px 12px; border-radius:20px; cursor:pointer; font-family:'Cairo',sans-serif;
  }
  .lang-btn.active{ background:var(--blue); color:#fff; border-color:var(--blue); }

  .input-card{
    background:var(--gray); border:1px solid var(--gray-line); border-radius:14px;
    padding:12px 14px; margin-bottom:14px;
  }
  .input-card .label{ color:var(--muted); font-size:12px; margin-bottom:8px; }
  .input-card input{
    width:100%; background:transparent; border:none; outline:none;
    color:#fff; font-family:'JetBrains Mono',monospace; font-size:12.5px;
    direction:ltr; text-align:right;
  }
  .input-card input::placeholder{ color:#6b6b6b; }

  .btn-primary{
    width:100%; background:var(--blue); color:#fff; border:none; border-radius:12px;
    padding:14px; font-family:'Cairo',sans-serif; font-weight:700; font-size:14.5px;
    margin-bottom:16px; display:flex; align-items:center; justify-content:center; gap:8px;
    cursor:pointer; transition:background .15s;
  }
  .btn-primary:hover{ background:var(--blue-light); }
  .btn-primary:disabled{ background:#3a4a5c; cursor:not-allowed; }

  .msg{ font-size:12.5px; color:var(--muted); margin-bottom:14px; min-height:0; line-height:1.8; }
  .msg.error{ color:#ff6b6b; }
  .msg.success{ color:#7fd88a; }

  .progress-card{
    background:var(--gray); border:1px solid var(--gray-line); border-radius:14px;
    padding:14px 16px; margin-bottom:14px; display:none;
  }
  .progress-card.show{ display:block; }
  .progress-top{ display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:10px; }
  .progress-top b{ color:#fff; font-weight:600; }
  .bar-track{ height:6px; background:#3d3d3d; border-radius:6px; overflow:hidden; }
  .bar-fill{ height:100%; width:0%; background:var(--red); border-radius:6px; transition:width .3s; }
  .progress-pct{ text-align:left; direction:ltr; font-size:11px; color:var(--red); margin-top:8px; font-family:'JetBrains Mono',monospace; }

  .platform-pill{
    display:inline-flex; align-items:center; gap:6px; margin-top:8px;
    background:rgba(21,101,192,.16); color:#d6eaff; border:1px solid var(--blue);
    border-radius:999px; padding:5px 10px; font-size:11px; font-family:'Cairo',sans-serif;
  }
  .list-card{
    background:var(--gray); border:1px solid var(--gray-line); border-radius:14px; padding:10px;
    display:none; gap:10px; align-items:center;
  }
  .list-card.show{ display:flex; }
  .thumb{ width:46px; height:46px; border-radius:8px; background:linear-gradient(135deg,#1e1e1e,#2b2b2b);
    flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .list-text{ flex:1; min-width:0; }
  .list-text .t1{ font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .list-text .t2{ font-size:11px; color:var(--muted); margin-top:3px; }
  .dl-icon{ color:var(--red); }
  .save-btn{
    background:var(--gray-line); border:none; color:#fff; padding:8px 12px; border-radius:8px;
    font-size:11px; font-family:'Cairo',sans-serif; cursor:pointer; flex-shrink:0;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">
    <div class="status-row">
      <div class="app-title">
        <svg viewBox="0 0 120 120"><circle cx="60" cy="54" r="46" fill="#1565C0"/><path d="M50 36 L80 54 L50 72 Z" fill="#FFFFFF"/><path d="M60 96 L46 78 H56 V64 H64 V78 H74 Z" fill="#D32F2F"/></svg>
        SnapVid
      </div>
      <a href="/mp3" class="mode-link" data-i18n="mode_mp3">🎵 MP3</a>
    </div>

    <div class="lang-row">
      <button class="lang-btn" data-lang="ar">AR</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>

    <div class="input-card">
      <div class="label" data-i18n="input_label_video">الصق رابط الفيديو (YouTube / TikTok / Instagram / Facebook)</div>
      <input id="urlInput" type="text" placeholder="https://...">
      <div class="platform-pill" id="platformPill">🔎 Platform: —</div>
    </div>

    <button class="btn-primary" id="downloadBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
      <span data-i18n="btn_download">تنزيل الآن</span>
    </button>

    <div class="msg" id="msg"></div>

    <div class="progress-card" id="progressCard">
      <div class="progress-top"><span data-i18n="progress_label_video">جارٍ التنزيل</span> <b id="progressStatus">...</b></div>
      <div class="bar-track"><div class="bar-fill" id="barFill"></div></div>
      <div class="progress-pct" id="progressPct">0%</div>
    </div>

    <div class="list-card" id="listCard">
      <div class="thumb">
        <svg width="18" height="18" viewBox="0 0 24 24" class="dl-icon" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
      </div>
      <div class="list-text">
        <div class="t1" id="fileTitle">—</div>
        <div class="t2" data-i18n="downloaded_label">تم التنزيل</div>
      </div>
      <button class="save-btn" id="saveBtn" data-i18n="save_btn">حفظ</button>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='i18n.js') }}"></script>
<script>
const urlInput = document.getElementById('urlInput');
const downloadBtn = document.getElementById('downloadBtn');
const msg = document.getElementById('msg');
const progressCard = document.getElementById('progressCard');
const progressStatus = document.getElementById('progressStatus');
const barFill = document.getElementById('barFill');
const progressPct = document.getElementById('progressPct');
const listCard = document.getElementById('listCard');
const fileTitle = document.getElementById('fileTitle');
const saveBtn = document.getElementById('saveBtn');
const platformPill = document.getElementById('platformPill');

let currentJobId = null;
let pollTimer = null;

function normalizeYouTubeUrl(url) {
  const trimmed = (url || '').trim();
  if (!trimmed) return trimmed;

  const shortMatch = trimmed.match(/youtu\.be\/([A-Za-z0-9_-]{11})/i);
  if (shortMatch) return `https://www.youtube.com/watch?v=${shortMatch[1]}`;

  const videoMatch = trimmed.match(/[?&]v=([A-Za-z0-9_-]{11})/i);
  if (videoMatch) return `https://www.youtube.com/watch?v=${videoMatch[1]}`;

  const shortsMatch = trimmed.match(/youtube\.com\/shorts\/([A-Za-z0-9_-]{11})/i);
  if (shortsMatch) return `https://www.youtube.com/watch?v=${shortsMatch[1]}`;

  return trimmed;
}

function detectPlatform(url) {
  const normalized = normalizeYouTubeUrl(url);
  const host = (normalized || '').toLowerCase();
  if (/youtube\.com|youtu\.be|m\.youtube\.com/.test(host)) return { icon: '▶', name: 'YouTube' };
  if (/tiktok\.com/.test(host)) return { icon: '♪', name: 'TikTok' };
  if (/instagram\.com/.test(host)) return { icon: '📷', name: 'Instagram' };
  if (/facebook\.com|fb\.watch/.test(host)) return { icon: 'f', name: 'Facebook' };
  return { icon: '🔗', name: 'Unsupported' };
}

function updatePlatformPill(url) {
  const platform = detectPlatform(url);
  platformPill.textContent = `${platform.icon} Platform: ${platform.name}`;
}

function t(key) {
  const lang = getLang();
  return (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) || TRANSLATIONS.ar[key];
}

function setMsg(text, type) {
  msg.textContent = text || "";
  msg.className = "msg" + (type ? " " + type : "");
}

function resetUI() {
  progressCard.classList.remove('show');
  listCard.classList.remove('show');
  barFill.style.width = "0%";
  progressPct.textContent = "0%";
}

urlInput.addEventListener('input', () => updatePlatformPill(urlInput.value.trim()));

downloadBtn.addEventListener('click', async () => {
  const url = normalizeYouTubeUrl(urlInput.value.trim());
  if (!url) {
    setMsg(t('err_empty_url'), "error");
    return;
  }

  resetUI();
  setMsg("");
  downloadBtn.disabled = true;
  downloadBtn.textContent = t('btn_starting');
  progressCard.classList.add('show');

  try {
    const res = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    const data = await res.json();

    if (!data.success) {
      setMsg(data.error || t('err_conn'), "error");
      downloadBtn.disabled = false;
      downloadBtn.innerHTML = originalBtnHTML();
      return;
    }

    currentJobId = data.job_id;
    downloadBtn.textContent = t('btn_downloading');
    pollStatus();
  } catch (err) {
    setMsg(t('err_conn'), "error");
    downloadBtn.disabled = false;
    downloadBtn.innerHTML = originalBtnHTML();
  }
});

function pollStatus() {
  pollTimer = setInterval(async () => {
    const res = await fetch(`/api/status/${currentJobId}`);
    const data = await res.json();

    if (!data.success) {
      clearInterval(pollTimer);
      setMsg(t('err_status'), "error");
      downloadBtn.disabled = false;
      downloadBtn.innerHTML = originalBtnHTML();
      return;
    }

    const statusKeyMap = { starting: 'status_starting', downloading: 'status_downloading', merging: 'status_merging', done: 'status_done', error: 'status_error' };
    progressStatus.textContent = t(statusKeyMap[data.status]) || data.status;
    const pct = data.progress || 0;
    barFill.style.width = pct + "%";
    progressPct.textContent = pct + "%";

    if (data.status === "done") {
      clearInterval(pollTimer);
      progressCard.classList.remove('show');
      listCard.classList.add('show');
      fileTitle.textContent = data.title || data.filename;
      setMsg(t('success_video'), "success");
      downloadBtn.disabled = false;
      downloadBtn.innerHTML = originalBtnHTML();

      saveBtn.onclick = () => {
        window.location.href = `/api/file/${currentJobId}`;
      };
    } else if (data.status === "error") {
      clearInterval(pollTimer);
      progressCard.classList.remove('show');
      setMsg(data.error || t('err_status'), "error");
      downloadBtn.disabled = false;
      downloadBtn.innerHTML = originalBtnHTML();
    }
  }, 1200);
}

function originalBtnHTML() {
  return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg> <span data-i18n="btn_download">${t('btn_download')}</span>`;
}
</script>
</body>
</html>
