<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1565C0">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icons/icon-192.png">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<title>SnapVid</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap');

  :root{
    --bg:#0F0F0F;
    --text:#FFFFFF;
    --blue:#1565C0;
    --blue-light:#1E7FE0;
    --red:#D32F2F;
    --gray:#2B2B2B;
    --gray-line:#3a3a3a;
    --muted:#9A9A9A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:30px 16px;
    overflow:hidden;
  }

  .phone{
    width:340px; height:640px; background:var(--bg); border:1px solid var(--gray-line);
    border-radius:34px; padding:14px;
    box-shadow:0 30px 80px rgba(0,0,0,.55);
    display:flex;
  }
  .screen{
    background:var(--bg); border-radius:22px; padding:22px 18px 26px;
    flex:1; display:flex; flex-direction:column;
  }

  /* Splash logo view */
  #logoView{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; opacity:1; transition:opacity .4s ease;
  }
  #logoView.hide{ opacity:0; pointer-events:none; position:absolute; }
  #logoView svg{ width:120px; height:120px; animation:pop .6s ease; }
  @keyframes pop{
    0%{ transform:scale(.6); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }
  .brand-name{
    font-family:'Cairo',sans-serif; font-weight:900; font-size:28px; letter-spacing:.5px;
  }
  .brand-name span{ color:var(--blue-light); }

  /* Language selection view */
  #langView{
    flex:1; display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:28px; opacity:0; transition:opacity .4s ease;
  }
  #langView.show{ display:flex; opacity:1; }
  #langView svg{ width:64px; height:64px; }
  .lang-title{ font-family:'Cairo',sans-serif; font-weight:700; font-size:16px; text-align:center; }
  .lang-sub{ color:var(--muted); font-size:12.5px; text-align:center; margin-top:-16px; }

  .lang-options{ display:flex; flex-direction:column; gap:12px; width:100%; }
  .lang-option{
    background:var(--gray); border:1px solid var(--gray-line); color:#fff;
    padding:14px 18px; border-radius:14px; font-family:'Cairo',sans-serif; font-weight:700;
    font-size:14.5px; cursor:pointer; display:flex; align-items:center; justify-content:space-between;
    transition:border-color .15s, background .15s;
  }
  .lang-option:hover{ border-color:var(--blue); background:rgba(21,101,192,.12); }
  .lang-option .code{ color:var(--muted); font-size:11px; font-weight:400; font-family:'JetBrains Mono',monospace; }
</style>
</head>
<body>

<div class="phone">
  <div class="screen" style="position:relative;">
    <div id="logoView">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="54" r="46" fill="#1565C0"/>
        <path d="M50 36 L80 54 L50 72 Z" fill="#FFFFFF"/>
        <path d="M60 96 L46 78 H56 V64 H64 V78 H74 Z" fill="#D32F2F"/>
      </svg>
      <div class="brand-name">Snap<span>Vid</span></div>
    </div>

    <div id="langView">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="54" r="46" fill="#1565C0"/>
        <path d="M50 36 L80 54 L50 72 Z" fill="#FFFFFF"/>
        <path d="M60 96 L46 78 H56 V64 H64 V78 H74 Z" fill="#D32F2F"/>
      </svg>
      <div>
        <div class="lang-title">اختر اللغة / Choisir la langue / Choose language</div>
      </div>
      <div class="lang-options">
        <button class="lang-option" data-lang="ar">العربية <span class="code">AR</span></button>
        <button class="lang-option" data-lang="fr">Français <span class="code">FR</span></button>
        <button class="lang-option" data-lang="en">English <span class="code">EN</span></button>
      </div>
    </div>
  </div>
</div>

<script>
  // بعد ثانيتين، بدل شاشة الشعار بشاشة اختيار اللغة
  setTimeout(() => {
    document.getElementById('logoView').classList.add('hide');
    document.getElementById('langView').classList.add('show');
  }, 1800);

  document.querySelectorAll('.lang-option').forEach(btn => {
    btn.addEventListener('click', () => {
      localStorage.setItem('snapvid_lang', btn.dataset.lang);
      window.location.href = '/app';
    });
  });

  // إيلا سبق للمستخدم يختار لغة، دوز مباشرة للتطبيق بلا ما يعاود
  if (localStorage.getItem('snapvid_lang')) {
    setTimeout(() => { window.location.href = '/app'; }, 1200);
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  }
</script>
</body>
</html>
